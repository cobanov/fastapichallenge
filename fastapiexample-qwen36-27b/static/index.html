<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventory Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#242836;--surface3:#2e3348;
  --border:#333850;--text:#e4e6f0;--text2:#9498b0;--text3:#6b7094;
  --accent:#6c5ce7;--accent2:#a29bfe;--accent-glow:rgba(108,92,231,.25);
  --success:#00cec9;--success-bg:rgba(0,206,201,.12);
  --danger:#ff6b6b;--danger-bg:rgba(255,107,107,.12);
  --warning:#feca57;--warning-bg:rgba(254,202,87,.12);
  --radius:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 4px 24px rgba(0,0,0,.3);--shadow-lg:0 8px 40px rgba(0,0,0,.4);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--accent2);text-decoration:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}

/* ============ LOGIN ============ */
.login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,var(--accent-glow),transparent 70%);top:-200px;right:-100px;animation:float1 8s ease-in-out infinite}
.login-page::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,206,201,.15),transparent 70%);bottom:-150px;left:-100px;animation:float2 10s ease-in-out infinite}
@keyframes float1{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,30px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes float2{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-40px)}}
.login-container{position:relative;z-index:1;width:100%;max-width:420px;padding:20px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.login-brand{text-align:center;margin-bottom:36px}
.login-brand .logo{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:var(--radius);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:16px;box-shadow:0 8px 32px var(--accent-glow)}
.login-brand h1{font-size:1.6rem;font-weight:800;letter-spacing:-.02em}
.login-brand p{color:var(--text2);font-size:.85rem;margin-top:6px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);padding:36px;box-shadow:var(--shadow-lg)}
.input-group{margin-bottom:20px;position:relative}
.input-group label{display:block;font-size:.75rem;font-weight:600;color:var(--text2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
.input-wrap{position:relative}
.input-wrap .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none;transition:var(--transition)}
.input-wrap input{width:100%;padding:12px 14px 12px 42px;background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.9rem;font-family:inherit;transition:var(--transition)}
.input-wrap input::placeholder{color:var(--text3)}
.input-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.input-wrap input:focus ~ .icon{color:var(--accent2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--radius);font-size:.85rem;font-weight:600;font-family:inherit;cursor:pointer;transition:var(--transition);position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--accent),#8b7cf7);color:#fff;width:100%;padding:14px;box-shadow:0 4px 16px var(--accent-glow)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-primary:active{transform:translateY(0)}
.login-footer{text-align:center;margin-top:20px;font-size:.75rem;color:var(--text3)}
.login-footer code{background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:.7rem}
.error-msg{color:var(--danger);font-size:.8rem;text-align:center;margin-top:16px;min-height:20px;font-weight:500}

/* ============ DASHBOARD LAYOUT ============ */
.dashboard{display:none;min-height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:rgba(15,17,23,.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:1400px;margin:0 auto}
.topbar-brand{display:flex;align-items:center;gap:12px}
.topbar-brand .logo-sm{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar-brand h2{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.topbar-brand span{font-size:.7rem;color:var(--text3);font-weight:400}
.topbar-right{display:flex;align-items:center;gap:16px}
.user-badge{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 6px;background:var(--surface);border:1px solid var(--border);border-radius:24px;font-size:.8rem}
.user-avatar{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--success));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);color:var(--text2);cursor:pointer;transition:var(--transition);font-size:14px}
.btn-icon:hover{border-color:var(--accent);color:var(--accent2)}
.btn-icon.danger:hover{border-color:var(--danger);color:var(--danger)}

/* ============ MAIN CONTENT ============ */
.main{max-width:1400px;margin:0 auto;padding:28px 32px 48px}

/* ============ STATS ============ */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:22px 24px;position:relative;overflow:hidden;transition:var(--transition)}
.stat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:2px 2px 0 0}
.stat-card:nth-child(1)::after{background:linear-gradient(90deg,var(--accent),var(--accent2))}
.stat-card:nth-child(2)::after{background:linear-gradient(90deg,var(--success),#55efc4)}
.stat-card:nth-child(3)::after{background:linear-gradient(90deg,var(--danger),#fab1a0)}
.stat-card:nth-child(4)::after{background:linear-gradient(90deg,var(--warning),#ffeaa7)}
.stat-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-card:nth-child(1) .stat-icon{background:rgba(108,92,231,.15);color:var(--accent2)}
.stat-card:nth-child(2) .stat-icon{background:var(--success-bg);color:var(--success)}
.stat-card:nth-child(3) .stat-icon{background:var(--danger-bg);color:var(--danger)}
.stat-card:nth-child(4) .stat-icon{background:var(--warning-bg);color:var(--warning)}
.stat-label{font-size:.72rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.stat-value{font-size:1.7rem;font-weight:800;letter-spacing:-.03em;line-height:1}
.stat-change{font-size:.7rem;color:var(--text3);margin-top:6px;display:flex;align-items:center;gap:4px}

/* ============ TOOLBAR ============ */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:380px}
.search-wrap .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.search-wrap input{width:100%;padding:10px 14px 10px 40px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:.85rem;font-family:inherit;transition:var(--transition)}
.search-wrap input::placeholder{color:var(--text3)}
.search-wrap input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.btn-add{display:flex;align-items:center;gap:8px;padding:10px 20px;background:linear-gradient(135deg,var(--accent),#8b7cf7);color:#fff;border:none;border-radius:var(--radius);cursor:pointer;font-size:.82rem;font-weight:600;font-family:inherit;transition:var(--transition);box-shadow:0 4px 16px var(--accent-glow)}
.btn-add:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-glow)}
.btn-add:active{transform:translateY(0)}

/* ============ TABLE ============ */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.table-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h3{font-size:.9rem;font-weight:700}
.table-header .count{font-size:.75rem;color:var(--text3);background:var(--surface2);padding:3px 10px;border-radius:12px}
table{width:100%;border-collapse:collapse}
thead th{padding:12px 24px;text-align:left;font-size:.7rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);background:var(--surface2)}
tbody tr{transition:var(--transition)}
tbody tr:hover{background:rgba(108,92,231,.04)}
tbody td{padding:14px 24px;font-size:.85rem;border-bottom:1px solid rgba(51,56,80,.5)}
tbody tr:last-child td{border-bottom:none}
.cell-id{font-weight:600;color:var(--text3);font-size:.78rem;font-variant-numeric:tabular-nums}
.cell-name{font-weight:600;display:flex;align-items:center;gap:10px}
.cell-name .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cell-name .dot.green{background:var(--success);box-shadow:0 0 6px rgba(0,206,201,.4)}
.cell-name .dot.red{background:var(--danger);box-shadow:0 0 6px rgba(255,107,107,.4)}
.cell-price{font-weight:600;font-variant-numeric:tabular-nums}
.cell-stock{font-variant-numeric:tabular-nums;color:var(--text2)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:600}
.badge-dot{width:6px;height:6px;border-radius:50%}
.badge-stock{background:var(--success-bg);color:var(--success)}
.badge-stock .badge-dot{background:var(--success)}
.badge-out{background:var(--danger-bg);color:var(--danger)}
.badge-out .badge-dot{background:var(--danger)}
.action-btns{display:flex;gap:6px}
.action-btn{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:var(--transition);font-size:12px}
.action-btn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(108,92,231,.1)}
.action-btn.del:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-bg)}
.empty-state{text-align:center;padding:64px 20px;color:var(--text3)}
.empty-state .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5}
.empty-state p{font-size:.9rem}

/* ============ MODAL ============ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-overlay.active{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:440px;box-shadow:var(--shadow-lg);animation:modalIn .3s ease}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:1rem;font-weight:700;display:flex;align-items:center;gap:10px}
.modal-header h3 .modal-icon{width:32px;height:32px;background:var(--accent-glow);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px}
.modal-close{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:none;background:var(--surface2);border-radius:8px;color:var(--text2);cursor:pointer;transition:var(--transition);font-size:16px}
.modal-close:hover{background:var(--danger-bg);color:var(--danger)}
.modal-body{padding:20px 28px}
.modal-body .input-group{margin-bottom:16px}
.modal-footer{padding:0 28px 24px;display:flex;gap:10px}
.modal-footer .btn{flex:1}
.btn-ghost{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.btn-ghost:hover{border-color:var(--text3);color:var(--text)}

/* ============ TOAST ============ */
.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:10px;padding:12px 20px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.82rem;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn .35s ease;min-width:260px}
.toast.removing{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px) scale(.95)}}
.toast-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.toast-success .toast-icon{background:var(--success-bg);color:var(--success)}
.toast-error .toast-icon{background:var(--danger-bg);color:var(--danger)}
.toast-progress{position:absolute;bottom:0;left:0;height:2px;border-radius:0 0 var(--radius) var(--radius);animation:progress 3s linear forwards}
.toast-success .toast-progress{background:var(--success)}
.toast-error .toast-progress{background:var(--danger)}
@keyframes progress{from{width:100%}to{width:0%}}
.toast{position:relative;overflow:hidden}

/* ============ RESPONSIVE ============ */
@media(max-width:900px){.stats{grid-template-columns:1fr 1fr}}
@media(max-width:640px){
  .main{padding:20px 16px 40px}
  .stats{grid-template-columns:1fr;gap:12px}
  .topbar{padding:0 16px}
  .toolbar{flex-direction:column;align-items:stretch}
  .search-wrap{max-width:none}
  thead th,tbody td{padding:12px 14px;font-size:.78rem}
  .cell-name{flex-direction:column;align-items:flex-start;gap:4px}
  .action-btns{flex-direction:column}
}
</style>
</head>
<body>

<div class="login-page" id="loginPage">
<div class="login-container">
<div class="login-brand">
<div class="logo">📦</div>
<h1>Inventory Pro</h1>
<p>Manage your items with precision</p>
</div>
<div class="login-card">
<div class="input-group">
<label>Username</label>
<div class="input-wrap">
<input type="text" id="username" placeholder="Enter your username" autocomplete="off">
<span class="icon">👤</span>
</div>
</div>
<div class="input-group">
<label>Password</label>
<div class="input-wrap">
<input type="password" id="password" placeholder="Enter your password">
<span class="icon">🔒</span>
</div>
</div>
<button class="btn btn-primary" onclick="login()">Sign In</button>
<div class="error-msg" id="loginError"></div>
<div class="login-footer">Demo: <code>admin</code> / <code>admin123</code></div>
</div>
</div>
</div>

<div class="dashboard" id="dashboard">
<div class="topbar">
<div class="topbar-inner">
<div class="topbar-brand">
<div class="logo-sm">📦</div>
<div><h2>Inventory Pro</h2><span>Item Management</span></div>
</div>
<div class="topbar-right">
<div class="user-badge">
<div class="user-avatar">A</div>
<span id="userLabel" style="font-size:.78rem;font-weight:500">Admin</span>
</div>
<button class="btn-icon danger" onclick="logout()" title="Logout">⏻</button>
</div>
</div>
</div>
<div class="main">
<div class="stats" id="stats"></div>
<div class="toolbar">
<div class="search-wrap">
<span class="search-icon">🔍</span>
<input type="text" id="searchInput" placeholder="Search by name..." oninput="filterItems()">
</div>
<button class="btn-add" onclick="openModal()">＋ Add Item</button>
</div>
<div class="table-card">
<div class="table-header">
<h3>All Items</h3>
<span class="count" id="itemCount">0 items</span>
</div>
<table>
<thead>
<tr><th style="width:60px">ID</th><th>Name</th><th style="width:100px">Price</th><th style="width:80px">Stock</th><th style="width:110px">Status</th><th style="width:90px">Actions</th></tr>
</thead>
<tbody id="itemsBody"></tbody>
</table>
<div class="empty-state" id="emptyState" style="display:none">
<div class="empty-icon">📭</div>
<p>No items found</p>
</div>
</div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
<div class="modal">
<div class="modal-header">
<h3><span class="modal-icon">📝</span> <span id="modalTitle">Add Item</span></h3>
<button class="modal-close" onclick="closeModal()">✕</button>
</div>
<div class="modal-body">
<div class="input-group">
<label>Item Name</label>
<div class="input-wrap">
<input type="text" id="itemName" placeholder="e.g. Wireless Mouse">
<span class="icon">📌</span>
</div>
</div>
<div class="input-group">
<label>Price ($)</label>
<div class="input-wrap">
<input type="number" id="itemPrice" placeholder="0.00" step="0.01" min="0">
<span class="icon">💲</span>
</div>
</div>
<div class="input-group">
<label>Stock Quantity</label>
<div class="input-wrap">
<input type="number" id="itemStock" placeholder="0" min="0">
<span class="icon">📊</span>
</div>
</div>
</div>
<div class="modal-footer">
<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
<button class="btn btn-primary" onclick="saveItem()" style="width:auto">Save Item</button>
</div>
</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let authHeader = localStorage.getItem('authHeader');
let allItems = [];
let editingId = null;

function authFetch(url, options = {}) {
    const headers = options.headers || {};
    if (authHeader) headers['Authorization'] = authHeader;
    return fetch(url, { ...options, headers })
        .then(res => {
            if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
            return res.json();
        });
}

async function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    if (!u || !p) { shakeEl(document.querySelector('.login-card')); showLoginError('Please fill in all fields'); return; }
    authHeader = 'Basic ' + btoa(u + ':' + p);
    try {
        await authFetch('/items/');
        localStorage.setItem('authHeader', authHeader);
        const uname = atob(authHeader.split(' ')[1]).split(':')[0];
        document.getElementById('userLabel').textContent = uname.charAt(0).toUpperCase() + uname.slice(1);
        showDashboard();
    } catch {
        authHeader = null;
        localStorage.removeItem('authHeader');
        showLoginError('Invalid credentials');
        shakeEl(document.querySelector('.login-card'));
    }
}

function shakeEl(el) {
    if (!el) return;
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'shake .4s ease';
    setTimeout(() => el.style.animation = '', 400);
}

function showLoginError(msg) { document.getElementById('loginError').textContent = msg; }

function logout() {
    authHeader = null;
    localStorage.removeItem('authHeader');
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginError').textContent = '';
}

async function showDashboard() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    await loadItems();
}

async function loadItems() {
    try {
        allItems = await authFetch('/items/');
        renderStats();
        renderItems(allItems);
    } catch (e) { toast('Failed to load items', 'error'); }
}

function renderStats() {
    const total = allItems.length;
    const inStock = allItems.filter(i => i.stock > 0).length;
    const outStock = total - inStock;
    const value = allItems.reduce((s, i) => s + i.price * i.stock, 0);
    document.getElementById('stats').innerHTML = `
        <div class="stat-card">
            <div class="stat-header"><div class="stat-icon">📦</div><div class="stat-label">Total Items</div></div>
            <div class="stat-value">${total}</div>
            <div class="stat-change">in inventory</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><div class="stat-icon">✓</div><div class="stat-label">In Stock</div></div>
            <div class="stat-value">${inStock}</div>
            <div class="stat-change">${total?Math.round(inStock/total*100):0}% available</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><div class="stat-icon">✗</div><div class="stat-label">Out of Stock</div></div>
            <div class="stat-value">${outStock}</div>
            <div class="stat-change">needs reorder</div>
        </div>
        <div class="stat-card">
            <div class="stat-header"><div class="stat-icon">$</div><div class="stat-label">Total Value</div></div>
            <div class="stat-value">$${value.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
            <div class="stat-change">inventory worth</div>
        </div>
    `;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function renderItems(items) {
    const body = document.getElementById('itemsBody');
    const empty = document.getElementById('emptyState');
    const count = document.getElementById('itemCount');
    count.textContent = `${allItems.length} items`;
    if (!items.length) { body.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    body.innerHTML = items.map(i => `
        <tr>
            <td class="cell-id">#${i.id}</td>
            <td class="cell-name"><span class="dot ${i.stock > 0 ? 'green' : 'red'}"></span>${esc(i.name)}</td>
            <td class="cell-price">$${i.price.toFixed(2)}</td>
            <td class="cell-stock">${i.stock.toLocaleString()}</td>
            <td><span class="badge ${i.stock > 0 ? 'badge-stock' : 'badge-out'}"><span class="badge-dot"></span>${i.stock > 0 ? 'In Stock' : 'Out of Stock'}</span></td>
            <td class="action-btns">
                <button class="action-btn" onclick="editItem(${i.id})" title="Edit">✎</button>
                <button class="action-btn del" onclick="deleteItem(${i.id})" title="Delete">🗑</button>
            </td>
        </tr>
    `).join('');
}

function filterItems() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = allItems.filter(i => i.name.toLowerCase().includes(q));
    renderItems(filtered);
}

function openModal(id) {
    editingId = id || null;
    document.getElementById('modalTitle').textContent = id ? 'Edit Item' : 'Add Item';
    if (id) {
        const item = allItems.find(i => i.id === id);
        document.getElementById('itemName').value = item.name;
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('itemStock').value = item.stock;
    } else {
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('itemStock').value = '';
    }
    document.getElementById('modalOverlay').classList.add('active');
    setTimeout(() => document.getElementById('itemName').focus(), 100);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); editingId = null; }
function closeModalOutside(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

async function saveItem() {
    const name = document.getElementById('itemName').value.trim();
    const price = parseFloat(document.getElementById('itemPrice').value);
    const stock = parseInt(document.getElementById('itemStock').value);
    if (!name || isNaN(price) || isNaN(stock)) { toast('Please fill all fields', 'error'); return; }
    try {
        if (editingId) {
            await authFetch(`/items/${editingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, stock })
            });
            toast('Item updated successfully', 'success');
        } else {
            await authFetch('/items/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, price, stock })
            });
            toast('Item created successfully', 'success');
        }
        closeModal();
        await loadItems();
    } catch { toast('Operation failed', 'error'); }
}

async function editItem(id) { openModal(id); }

async function deleteItem(id) {
    if (!confirm('Are you sure you want to delete this item?')) return;
    try {
        await authFetch(`/items/${id}`, { method: 'DELETE' });
        toast('Item deleted', 'success');
        await loadItems();
    } catch { toast('Delete failed', 'error'); }
}

function toast(msg, type) {
    const t = document.createElement('div');
    t.className = `toast toast-${type}`;
    t.innerHTML = `<div class="toast-icon">${type === 'success' ? '✓' : '✗'}</div><span>${msg}</span><div class="toast-progress"></div>`;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => { t.classList.add('removing'); setTimeout(() => t.remove(), 300); }, 3000);
}

document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
document.getElementById('username').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('password').focus(); });

if (authHeader) showDashboard();
</script>
</body>
</html>
