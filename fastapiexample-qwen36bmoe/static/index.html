<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Item Manager</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8fafc;--surface:#fff;--surface-hover:#f1f5f9;--border:#e2e8f0;
  --text:#0f172a;--text-secondary:#64748b;--text-muted:#94a3b8;
  --primary:#6366f1;--primary-hover:#4f46e5;--primary-light:#eef2ff;--primary-border:#c7d2fe;
  --success:#10b981;--success-light:#ecfdf5;--success-border:#a7f3d0;
  --danger:#ef4444;--danger-light:#fef2f2;--danger-border:#fecaca;
  --warning:#f59e0b;--warning-light:#fffbeb;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.05);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.08),0 4px 6px -4px rgba(0,0,0,.04);
  --shadow-xl:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.06);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── Login ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(99,102,241,.15) 0%,transparent 70%);top:-200px;right:-100px;pointer-events:none}
.login-page::after{content:'';position:absolute;width:500px;height:500px;border-radius:50%;
  background:radial-gradient(circle,rgba(139,92,246,.1) 0%,transparent 70%);bottom:-150px;left:-100px;pointer-events:none}
.login-card{background:var(--surface);border-radius:var(--radius-lg);padding:48px;width:100%;max-width:420px;
  box-shadow:var(--shadow-xl);position:relative;z-index:1;animation:cardIn .5s cubic-bezier(.4,0,.2,1)}
@keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo .icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--primary),#8b5cf6);
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 8px 24px rgba(99,102,241,.3)}
.login-logo .icon svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.login-logo h1{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.login-logo p{font-size:14px;color:var(--text-secondary);margin-top:4px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;letter-spacing:.01em}
.form-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:15px;color:var(--text);background:var(--surface);transition:var(--transition);outline:none}
.form-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.form-input::placeholder{color:var(--text-muted)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border:none;border-radius:var(--radius-sm);
  font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);outline:none;position:relative;overflow:hidden}
.btn::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}
.btn:active{transform:scale(.98)}
.btn-primary{background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.3)}
.btn-primary:hover{box-shadow:0 6px 20px rgba(99,102,241,.4);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-ghost{background:transparent;color:var(--text-secondary);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--surface-hover);border-color:#cbd5e1;color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626;box-shadow:0 4px 12px rgba(239,68,68,.3)}
.btn-sm{padding:8px 14px;font-size:13px;border-radius:6px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:8px}
.login-error{background:var(--danger-light);border:1px solid var(--danger-border);color:var(--danger);
  padding:12px 16px;border-radius:var(--radius-sm);font-size:14px;margin-top:16px;display:none;
  display:flex;align-items:center;gap:8px;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* ── Dashboard Layout ── */
.app{display:none;min-height:100vh}
.navbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;height:64px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:var(--shadow-sm)}
.navbar-brand{display:flex;align-items:center;gap:12px}
.navbar-brand .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#8b5cf6);
  display:flex;align-items:center;justify-content:center}
.navbar-brand .logo svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.navbar-brand h1{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.navbar-actions{display:flex;align-items:center;gap:12px}
.navbar-user{display:flex;align-items:center;gap:10px;padding:6px 12px 6px 6px;border-radius:var(--radius-sm);
  background:var(--bg);cursor:pointer;transition:var(--transition)}
.navbar-user:hover{background:var(--surface-hover)}
.navbar-user .avatar{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--primary),#8b5cf6);
  display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700}
.navbar-user .name{font-size:14px;font-weight:600;color:var(--text)}

.dashboard{max-width:1280px;margin:0 auto;padding:32px}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;
  transition:var(--transition);position:relative;overflow:hidden}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--radius) var(--radius) 0 0}
.stat-card:nth-child(1)::after{background:linear-gradient(90deg,var(--primary),#8b5cf6)}
.stat-card:nth-child(2)::after{background:linear-gradient(90deg,var(--success),#34d399)}
.stat-card:nth-child(3)::after{background:linear-gradient(90deg,var(--danger),#f87171)}
.stat-card:nth-child(4)::after{background:linear-gradient(90deg,var(--warning),#fbbf24)}
.stat-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.stat-icon svg{width:22px;height:22px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stat-icon.purple{background:var(--primary-light);color:var(--primary)}
.stat-icon.purple svg{stroke:var(--primary)}
.stat-icon.green{background:var(--success-light);color:var(--success)}
.stat-icon.green svg{stroke:var(--success)}
.stat-icon.red{background:var(--danger-light);color:var(--danger)}
.stat-icon.red svg{stroke:var(--danger)}
.stat-icon.yellow{background:var(--warning-light);color:var(--warning)}
.stat-icon.yellow svg{stroke:var(--warning)}
.stat-label{font-size:13px;font-weight:500;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.stat-value{font-size:32px;font-weight:800;color:var(--text);letter-spacing:-.03em;line-height:1.1}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.search-wrapper{position:relative;flex:1;max-width:480px}
.search-wrapper svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;
  stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none;transition:stroke .2s}
.search-wrapper input{width:100%;padding:11px 16px 11px 42px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;color:var(--text);background:var(--surface);transition:var(--transition);outline:none}
.search-wrapper input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.1);color:var(--text)}
.search-wrapper input:focus+svg,.search-wrapper input:focus~svg{stroke:var(--primary)}
.search-wrapper input::placeholder{color:var(--text-muted)}
.search-count{font-size:13px;color:var(--text-muted);white-space:nowrap}
.toolbar-right{display:flex;gap:10px}

/* ── Table ── */
.table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm)}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:var(--bg)}
th{padding:14px 20px;text-align:left;font-size:12px;font-weight:600;color:var(--text-secondary);
  text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border);white-space:nowrap;user-select:none;cursor:default}
th.sortable{cursor:pointer;transition:color .2s}
th.sortable:hover{color:var(--text)}
td{padding:16px 20px;border-bottom:1px solid var(--border);font-size:14px;color:var(--text);white-space:nowrap}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--surface-hover)}
tbody tr:last-child td{border-bottom:none}
.item-name{font-weight:600;color:var(--text)}
.item-price{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;font-weight:600;color:var(--text)}
.stock-num{font-family:'SF Mono',SFMono-Regular,Consolas,'Liberation Mono',Menlo,monospace;color:var(--text-secondary)}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.badge::before{content:'';width:6px;height:6px;border-radius:50%}
.badge-in-stock{background:var(--success-light);color:#059669;border:1px solid var(--success-border)}
.badge-in-stock::before{background:var(--success)}
.badge-out-of-stock{background:var(--danger-light);color:#dc2626;border:1px solid var(--danger-border)}
.badge-out-of-stock::before{background:var(--danger)}

/* Row actions */
.row-actions{display:flex;gap:6px;opacity:0;transition:opacity .15s}
tbody tr:hover .row-actions{opacity:1}
.row-actions .btn-icon{width:32px;height:32px;padding:0;border-radius:6px;background:transparent;border:1px solid transparent;
  cursor:pointer;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.row-actions .btn-icon svg{width:16px;height:16px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.row-actions .btn-icon.edit:hover{background:var(--primary-light);border-color:var(--primary-border)}
.row-actions .btn-icon.edit svg{stroke:var(--primary)}
.row-actions .btn-icon.delete:hover{background:var(--danger-light);border-color:var(--danger-border)}
.row-actions .btn-icon.delete svg{stroke:var(--danger)}

/* Empty state */
.empty-state{padding:80px 24px;text-align:center}
.empty-state .empty-icon{width:80px;height:80px;border-radius:50%;background:var(--bg);
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.empty-state .empty-icon svg{width:40px;height:40px;stroke:var(--text-muted);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text);margin-bottom:8px}
.empty-state p{font-size:14px;color:var(--text-muted);margin-bottom:24px;max-width:320px;margin-left:auto;margin-right:auto}

/* ── Modal ── */
.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(8px);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease}
.modal-backdrop.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:none}}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:480px;
  box-shadow:var(--shadow-xl);animation:modalIn .3s cubic-bezier(.4,0,.2,1);overflow:hidden}
.modal-header{padding:24px 28px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.modal-close{width:36px;height:36px;border-radius:8px;border:none;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:var(--transition);color:var(--text-secondary)}
.modal-close:hover{background:var(--surface-hover);color:var(--text)}
.modal-close svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.modal-body{padding:24px 28px}
.modal-footer{padding:16px 28px 24px;display:flex;justify-content:flex-end;gap:10px}

/* ── Toast ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:12px;padding:14px 20px;border-radius:var(--radius);
  background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-lg);
  animation:toastIn .3s cubic-bezier(.4,0,.2,1);min-width:280px;max-width:400px}
.toast.removing{animation:toastOut .3s cubic-bezier(.4,0,.2,1) forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px)}}
.toast-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.toast-icon svg{width:14px;height:14px;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.toast-success .toast-icon{background:var(--success-light)}
.toast-success .toast-icon svg{stroke:var(--success)}
.toast-error .toast-icon{background:var(--danger-light)}
.toast-error .toast-icon svg{stroke:var(--danger)}
.toast-info .toast-icon{background:var(--primary-light)}
.toast-info .toast-icon svg{stroke:var(--primary)}
.toast-msg{font-size:14px;font-weight:500;color:var(--text)}

/* ── Responsive ── */
@media(max-width:1024px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .login-card{margin:16px;padding:32px 24px}
  .navbar{padding:0 16px}
  .dashboard{padding:20px 16px}
  .stats-grid{grid-template-columns:1fr 1fr;gap:12px}
  .stat-card{padding:18px}
  .stat-value{font-size:26px}
  .toolbar{flex-direction:column;align-items:stretch}
  .toolbar-left{flex-direction:column}
  .search-wrapper{max-width:none}
  td,th{padding:12px 14px}
  .row-actions{opacity:1}
  .modal{margin:16px}
  .modal-header,.modal-body,.modal-footer{padding-left:20px;padding-right:20px}
  .toast-container{left:16px;right:16px}
  .toast{min-width:auto}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr}
  .navbar-brand h1{display:none}
}
</style>
</head>
<body>

<!-- Login Page -->
<div class="login-page" id="loginPage">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      </div>
      <h1>Item Manager</h1>
      <p>Sign in to manage your inventory</p>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-input" placeholder="Enter username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="Enter password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Sign In</button>
    </form>
    <div class="login-error" id="loginError" style="display:none">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      <span>Invalid credentials. Please try again.</span>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div class="app" id="app">
  <nav class="navbar">
    <div class="navbar-brand">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
      </div>
      <h1>Item Manager</h1>
    </div>
    <div class="navbar-actions">
      <div class="navbar-user">
        <div class="avatar" id="userAvatar">A</div>
        <span class="name" id="userName">admin</span>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Logout
      </button>
    </div>
  </nav>

  <main class="dashboard">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon purple">
          <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
        <div class="stat-label">Total Items</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat-label">In Stock</div>
        <div class="stat-value" id="statInStock">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        </div>
        <div class="stat-label">Out of Stock</div>
        <div class="stat-value" id="statOutOfStock">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="stat-label">Total Value</div>
        <div class="stat-value" id="statTotalValue">$0</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-wrapper">
          <input type="text" id="searchInput" placeholder="Search by name..." oninput="filterItems()">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <span class="search-count" id="searchCount"></span>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-primary" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Item
        </button>
      </div>
    </div>

    <div class="table-card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th style="width:100px">Actions</th>
            </tr>
          </thead>
          <tbody id="itemsTableBody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="emptyState" style="display:none">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        </div>
        <h3>No items yet</h3>
        <p>Get started by adding your first item to the inventory.</p>
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Item
        </button>
      </div>
    </div>
  </main>
</div>

<!-- Modal -->
<div class="modal-backdrop" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">Add Item</h2>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" class="form-input" placeholder="Enter item name" required>
      </div>
      <div class="form-group">
        <label for="itemPrice">Price ($)</label>
        <input type="number" id="itemPrice" class="form-input" placeholder="0.00" step="0.01" min="0" required>
      </div>
      <div class="form-group">
        <label for="itemStock">Stock</label>
        <input type="number" id="itemStock" class="form-input" placeholder="0" min="0" value="0" required>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveItem()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        <span id="modalBtnText">Save Item</span>
      </button>
    </div>
  </div>
</div>

<!-- Toasts -->
<div class="toast-container" id="toastContainer"></div>

<script>
let items=[];let credentials=localStorage.getItem('api_creds');

const $=s=>document.getElementById(s);

// ── Auth ──
$('loginForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const u=$('username').value,p=$('password').value;
  credentials=btoa(u+':'+p);localStorage.setItem('api_creds',credentials);
  try{
    const r=await fetch('/items/',{headers:{'Authorization':'Basic '+credentials}});
    if(!r.ok)throw new Error();
    $('loginPage').style.display='none';$('app').style.display='block';
    $('userName').textContent=u;$('userAvatar').textContent=u[0].toUpperCase();
    await loadItems();
  }catch{$('loginError').style.display='flex';setTimeout(()=>$('loginError').style.display='none',4000)}
});

function logout(){localStorage.removeItem('api_creds');location.reload()}

// ── Data ──
async function loadItems(){
  const r=await fetch('/items/',{headers:{'Authorization':'Basic '+credentials}});
  items=await r.json();updateStats();renderItems(items);
}

function updateStats(){
  $('statTotal').textContent=items.length;
  $('statInStock').textContent=items.filter(i=>i.stock>0).length;
  $('statOutOfStock').textContent=items.filter(i=>i.stock===0).length;
  const v=items.reduce((s,i)=>s+i.price*i.stock,0);
  $('statTotalValue').textContent='$'+v.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function renderItems(list){
  const tbody=$('itemsTableBody'),empty=$('emptyState'),count=$('searchCount');
  if(!list.length){tbody.innerHTML='';empty.style.display='block';count.textContent='';return}
  empty.style.display='none';count.textContent=list.length+(list.length!==items.length?' of '+items.length:'')+' item'+(list.length!==1?'s':'');
  tbody.innerHTML=list.map(i=>`
    <tr>
      <td><span class="item-name">${esc(i.name)}</span></td>
      <td><span class="item-price">$${i.price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>
      <td><span class="stock-num">${i.stock.toLocaleString()}</span></td>
      <td><span class="badge ${i.stock>0?'badge-in-stock':'badge-out-of-stock'}">${i.stock>0?'In Stock':'Out of Stock'}</span></td>
      <td>
        <div class="row-actions">
          <button class="btn-icon edit" title="Edit" onclick="editItem(${i.id})">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="btn-icon delete" title="Delete" onclick="deleteItem(${i.id})">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function filterItems(){
  const q=$('searchInput').value.toLowerCase();
  renderItems(items.filter(i=>i.name.toLowerCase().includes(q)));
}

// ── Modal ──
function openModal(id=null){
  $('editId').value=id||'';
  $('itemName').value='';$('itemPrice').value='';$('itemStock').value='0';
  $('modalTitle').textContent=id?'Edit Item':'Add Item';
  $('modalBtnText').textContent=id?'Update Item':'Save Item';
  $('modalOverlay').classList.add('active');
  setTimeout(()=>$('itemName').focus(),100);
}
function closeModal(){$('modalOverlay').classList.remove('active')}

async function saveItem(){
  const id=$('editId').value,name=$('itemName').value,price=parseFloat($('itemPrice').value),stock=parseInt($('itemStock').value);
  if(!name||isNaN(price)||isNaN(stock)){showToast('Please fill all fields','error');return}
  const url=id?`/items/${id}`:'/items/',method=id?'PUT':'POST';
  const r=await fetch(url,{method,headers:{'Authorization':'Basic '+credentials,'Content-Type':'application/x-www-form-urlencoded'},
    body:`name=${encodeURIComponent(name)}&price=${price}&stock=${stock}`});
  if(!r.ok){showToast('Error saving item','error');return}
  closeModal();await loadItems();showToast(id?'Item updated':'Item created',id?'success':'success');
}

function editItem(id){const item=items.find(i=>i.id===id);if(!item)return;openModal(id);$('itemName').value=item.name;$('itemPrice').value=item.price;$('itemStock').value=item.stock}

async function deleteItem(id){
  if(!confirm('Are you sure you want to delete this item?'))return;
  const r=await fetch(`/items/${id}`,{method:'DELETE',headers:{'Authorization':'Basic '+credentials}});
  if(!r.ok){showToast('Error deleting item','error');return}
  await loadItems();showToast('Item deleted','success');
}

// ── Toast ──
function showToast(msg,type='info'){
  const icons={
    success:'<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>',
    error:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
    info:'<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>'
  };
  const t=document.createElement('div');t.className=`toast toast-${type}`;
  t.innerHTML=`<div class="toast-icon">${icons[type]}</div><span class="toast-msg">${msg}</span>`;
  $('toastContainer').appendChild(t);
  setTimeout(()=>{t.classList.add('removing');setTimeout(()=>t.remove(),300)},3000);
}

// ── Init ──
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
if(credentials)fetch('/items/',{headers:{'Authorization':'Basic '+credentials}}).then(r=>{if(r.ok){$('loginPage').style.display='none';$('app').style.display='block';loadItems()}});
</script>
</body>
</html>
