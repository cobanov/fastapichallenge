<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ItemPro | Inventory Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .login-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-in { animation: slideIn 0.5s ease-out forwards; }
        .stats-card:hover { transform: translateY(-4px); transition: all 0.3s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-0 sm:p-6">

    <!-- Login Page Overlay -->
    <div id="login-page" class="fixed inset-0 z-[100] login-gradient flex items-center justify-center p-4">
        <div class="glass-card bg-white/95 p-8 w-full max-w-md rounded-3xl shadow-2xl animate-slide-inc">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-100 text-indigo-600 rounded-2xl mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7l8-4" /></svg>
                </div>
                <h1 class="text-3xl font-bold text-gray-900">ItemPro</h1>
                <p class="text-gray-500 mt-2">Inventory Management System</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username" placeholder="admin" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:border-transparent outline-none transition" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition active:scale-95">Sign In</button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard Content -->
    <div id="dashboard" class="hidden w-full max-w-7xl mx-auto space-y-6 animate-slide-in mt-0 sm:mt-8">
        
        <!-- Navbar -->
        <nav class="glass-card bg-white/70 px-6 py-4 rounded-2xl flex justify-between items-center shadow-sm border border-gray-100">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7l8-4" /></svg>
                </div>
                <span class="text-xl font-bold text-gray-800 tracking-tight">ItemPro Dashboard</span>
            </div>
            <button id="logout-btn" class="flex items-center space-x-2 px-4 py-2 rounded-lg text-red-600 hover:bg-red-50 transition font-medium">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v8z" /></svg>
                <span>Logout</span>
            </button>
        </nav>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="glass-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 stats-card">
                <p class="text-sm font-medium text-gray/500 uppercase tracking-wider mb-1">Total Items</p>
                <h2 id="stat-total" class="text-4xl font-bold text-indigo-600">0</h2>
            </div>
            <div class="glass-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 stats-card">
                <p class="text-sm font-medium text-green-600/70 uppercase tracking-wider mb-1">In Stock</p>
                <h2 id="stat-instock" class="text-4xl font-bold text-green-600">0</h2>
            </div>
            <div class="glass-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 stats-card">
                <p class="text-sm font-medium text-red-600/70 uppercase tracking-wider mb-1">Out of Stock</p>
                <h2 id="stat-outstock" class="text-4xl font-bold text-red-600">0</h2>
            </div>
            <div class="glass-card bg-white p-6 rounded-3xl shadow-sm border border-gray-100 stats-card">
                <p class="text-sm font-medium text-blue-600/70 uppercase tracking-wider mb-1">Total Value</p>
                <h2 id="stat-value" class="text-4xl font-bold text-blue-600">$0.00</h2>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="relative w-full sm:max-w-md">
                <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                </span>
                <input type="text" id="search-input" placeholder="Search your inventory..." class="w-full pl-12 pr-4 py-4 bg-white border-none rounded-2xl shadow-sm focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>
            <button id="add-btn" class="w-full sm:w-auto px-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition active:scale-95 flex items-center justify-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                <span>Add Item</span>
            </button>
        </div>

        <!-- Table Container -->
        <div class="glass-card bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50/50 text-gray-500 uppercase text-xs font-semibold tracking-widard">
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Product Name</th>
                        <th class="px-6 py-4">Price</th>
                        <th class="px-6 py-4">Inventory Status</th>
                        <th class="px-6 py-4 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="items-table-body" class="divide-y divide-gray-100">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
                
    </div>

    <!-- Modal Overlay -->
    <div id="modal" class="hidden fixed inset-0 z-[150] flex items-center justify-center p-4 bg-gray-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden animate-slide-in">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                <h2 id="modal-title" class="text-lg font-bold text-gray-800">Manage Item</h2>
                <button id="close-modal" class="text-gray-400 hover:text-gray-600 transition"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg></button>
            </div>
            <form id="item-form" class="p-6 space-y-5">
                <input type="hidden" id="form-id">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1.5">Product Name</label>
                    <input type="text" id="form-name" placeholder="e.g. Gaming Mouse" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" required>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Price ($)</label>
                        <input type="number" step="0.01" id="form-price" placeholder="0.00" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1.5">Stock Count</label>
                        <input type="number" id="form-stock" placeholder="0" class="w-full px-4 py-2.5 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none transition" required>
                    </div>
                </div>
                <div class="pt-4 flex space-x-3">
                    <button type="button" id="cancel-btn" class="flex-1 px-4 py-2.5 border border-gray-200 text-gray-600 rounded-xl hover:bg-gray-50 transition font-medium">Cancel</button>
                    <button type="submit" class="flex-1 px-                4 py-2.5 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 shadow-lg shadow-indigo-200 transition font-semibold">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-6 right-6 space-y-3 z-[200]"></div>

    <script>
        let authHeader = '';
        let items = [];

        const loginPage = document.getElementById('login-page');
        const dashboard = document.getElementById('dashboard');
        const loginForm = document.getElementById('login-form');
        const itemForm = document.getElementById('item-form');
        const itemsTableBody = document.getElementById('items-table-body');
        const searchInput = document.getElementById('search-input');
        const modal = document.getElementById('modal');
        const logoutBtn = document.getElementById('logout-btn');
        const addBtn = document.getElementById('add-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const closeModalBtn = document.getElementById('close-modal');
        const toastContainer = document.getElementById('toast-container');

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            const icon = type === 'success' 
                ? '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>'
                : '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>';
            
            toast.className = `flex items-center space-x-3 px-6 py-4 rounded-2xl shadow-2xl text-white ${type === 'success' ? 'bg-emerald-600' : 'bg-rose-600'} animate-slide-in transform transition duration-300`;
            toast.innerHTML = `<span>${icon}</span><span class="font-medium">${message}</span>`;
            
            toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-x-12');
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        loginForm.onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            authHeader = 'Basic ' + btoa(user + ':' + pass);
            try {
                const res = await fetch('/items/', { headers: { 'Authorization': authHeader } });
                if (res.ok) {
                    loginPage.classList.add('hidden');
                    dashboard.classList.remove('hidden');
                    fetchItems();
                    showToast('Authentication Successful');
                } else {
                    showToast('Invalid credentials', 'error');
                }
            } catch (err) { showToast('Connection Error', 'error'); }
        };

        logoutBtn.onclick = () => {
            authHeader = '';
            loginPage.classList.remove('hidden');
            dashboard.classList.add('                hidden');
            showToast('Logged out successfully');
        };

        async function fetchItems(query = '') {
            const url = query ? `/items/search?name=${encodeURIComponent(query)}` : '/items/';
            try {
                const res = await fetch(url, { headers: { 'Authorization': authHeader } });
                if (!res.ok) throw new Error();
                items = await res.json();
                renderItems(items);
                updateStats(items);
            } catch (err) { showToast('Failed to load inventory', 'error'); }
        }

        function renderItems(data) {
            itemsTableBody.innerHTML = '';
            if (data.length === 0) {
                itemsTableBody.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-gray-400 font-medium italic">No products found in database</td></tr>`;
                return;
            }
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'group hover:bg-indigo-50/30 transition cursor-default';
                tr.innerHTML = `
                    <td class="px-6 py-4 font-mono text-sm text-gray-500">#${item.id}</td>
                    <td class="px-6 py-4 font-semibold text-gray-800">${item.name}</td>
                    <td class="px-6 py-4 text-indigo-600 font-bold">$${item.price.toFixed(2)}</td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-3 py-1 rounded-full text-xs font-bold ${item.stock > 0 ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}">
                            <span class="w-1.5 h-1.5 rounded-full mr-2 ${item.stock > 0 ? 'bg-emerald-500' : 'bg-rose-500'}"></span>
                            ${item.stock} Units
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right space-x-3">
                        <button onclick="editItem(${item.id})" class="text-indigo-600 hover:text-indigo-800 font-medium transition opacity-70 group-hover:opacity-100">Edit</button>
                        <button onclick="deleteItem(${item.id})" class="text-rose-600 hover:text-rose-800 font-medium transition opacity-70 group-hover:opacity-100">Delete</button>
                    </td>
                `;
                itemsTableBody.appendChild(tr);
            });
        }

        function updateStats(data) {
            document.getElementById('stat-total').innerText = data.length;
            const inStock = data.filter(i => i.stock > 0).length;
            const outOfStock = data.length - inStock;
            const totalValue = data.reduce((sum, i) => sum + (i.price * i.stock), 0);
            document.getElementById('stat-instock').innerText = inStock;
            document.getElementById('stat-outstock').innerText = outOfStock;
            document.getElementById('stat-value').innerText = '$' + totalValue.toLocaleString(undefined, {minimumFractionDigits: 2});
        }

        window.editItem = (id) => {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('form-id').value = item.id;
            document.getElementById('form-name').value = item.name;
            document.getElementById('form-price').value = item.price;
            document.getElementById('form-stock').value = item.stock;
            document.getElementById('modal-title').innerText = 'Edit Product';
            modal.classList.remove('hidden');
        };

        window.deleteItem = async (id) => {
            if (!confirm('Permanently remove this product?')) return;
            try {
                const res = await fetch(`/items/${id}`, { method: 'DELETE', headers: { 'Authorization': authHeader } });
                if (res.ok) { showToast('Product removed'); fetchItems(); }
                else { showToast('Delete failed', 'error'); }
            } catch (err) { showToast('Network error', 'error'); }
        };

        addBtn.onclick = () => {
            document.getElementById('item-form').reset();
            document.getElementById('form-id').value = '';
            document.getElementById('modal-title').innerText = 'New Product';
            modal.classList.remove('hidden');
                };

        cancelBtn.onclick = closeModalBtn.onclick = () => modal.classList.add('hidden');
        searchInput.oninput = (e) => fetchItems(e.target.value);

        itemForm.onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('form-id').value;
            const itemData = {
                id: id ? parseInt(id) : Date.now(),
                name: document.getElementById('form-name').value,
                price: parseFloat(document.getElementById('form-price').value),
                stock: parseInt(document.getElementById('form-stock').value)
            };
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/items/${id}` : '/items/';

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Authorization': authHeader, 'Content-Type': 'application/json' },
                    body: JSON.stringify(itemData)
                });
                if (res.ok) {
                    showToast(id ? 'Update successful' : 'Product added');
                    modal.classList.add('hidden');
                    fetchItems();
                } else { showToast('Save failed', 'error'); }
            } catch (err) { showToast('Error saving item', 'error'); }
        };

        window.onkeydown = (e) => { if (e.key === 'Escape') modal.classList.add('hidden'); };
    </script>
</body>
</html>
